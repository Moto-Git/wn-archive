name: Refresh broadcast data

# ClaudeOps(private)がクラウドで毎日更新する wn-broadcasts.csv を取り込み、
# 放送データを再生成してコミットする。push をトリガーに deploy.yml がサイトを再公開。
# Mac の起動有無に依存しない完全クラウド更新。
#
# 認証: ClaudeOps(private) への読み取り専用 SSH デプロイキーを使う。
#   秘密鍵は wn-archive の Actions secret `CLAUDEOPS_DEPLOY_KEY` に登録済み。

on:
  schedule:
    # 3時間ごと(UTC :40)。各放送(JST 05/08/11/14/17/20/23時)は約10分後にCSVへ取込まれるため、
    # この頻度なら当日の番組が概ね1.5時間以内にサイトへ反映される。1日1回(朝のみ)だと当日が
    # サンシャインまでしか出ない問題への対策。
    - cron: "40 */3 * * *"
  workflow_dispatch:

permissions:
  contents: write

# 実行の重なり対策: 同一ブランチの refresh は直列化する。実行中に次の cron が来ても
# 割り込ませず（cancel-in-progress: false）、前の run が終わってから走らせる。
# これで 2 つの run が同時にコミット＆push して競合するのを防ぐ。
concurrency:
  group: refresh-data-${{ github.ref }}
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Checkout ClaudeOps (private, read-only deploy key)
        uses: actions/checkout@v4
        with:
          repository: Moto-Git/claude-ops
          ssh-key: ${{ secrets.CLAUDEOPS_DEPLOY_KEY }}
          path: claude-ops
          sparse-checkout: roles/publisher/output/watch-digest/wn-broadcasts.csv
          sparse-checkout-cone-mode: false

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Regenerate broadcast data
        run: node scripts/build-data.mjs claude-ops/roles/publisher/output/watch-digest/wn-broadcasts.csv

      # プライバシーガード: 公開リポジトリなのに完全版データ(minorin由来)が混入していないか検証する。
      # 完全版 build-data.mjs を誤って cp すると FULL=true になり minorin・コラボが漏れるため、
      # meta.full===true または collab>0 を検知したらコミットを止める。yml は cp 対象外で恒久的に効く。
      - name: Verify public dataset (no minorin leak)
        run: |
          node -e '
            const m = require("./src/data/meta.json");
            if (m.full === true) { console.error("✗ meta.full=true（完全版 build-data.mjs が混入＝minorin漏れの恐れ）"); process.exit(1); }
            if ((m.collab || 0) > 0) { console.error("✗ collab>0（minorin由来コラボが公開データに混入）"); process.exit(1); }
            console.log(`✓ 公開データ確認: collab=${m.collab||0} / キャスター${m.casters.length}名（タイトル抽出+公式のみ）`);
          '

      - name: Refresh feeds & YouTube
        env:
          YT_API_KEY: ${{ secrets.YT_API_KEY }}
        run: |
          node scripts/build-feeds.mjs || true
          node scripts/build-yt.mjs || true

      - name: Commit if changed
        run: |
          git config user.name  "wn-archive-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/broadcasts.json src/data/meta.json public/updates.json public/wn-yt/
          if git diff --cached --quiet; then
            echo "変更なし"
            exit 0
          fi
          git commit -m "data: 放送データ自動更新 $(date -u +%Y-%m-%d)"
          # 手動 push や他 run とリモートが競合しても失敗しないよう、rebase して最大5回リトライ。
          # データ系ファイルは prebuild で再生成されるため rebase 衝突しても自分の生成結果を採用する。
          branch="${GITHUB_REF_NAME:-main}"
          for i in 1 2 3 4 5; do
            if git push origin "HEAD:${branch}"; then
              echo "push 成功 (試行 ${i})"
              exit 0
            fi
            echo "push 失敗。リモートを取り込んで再試行 (${i}/5)"
            git pull --rebase -X ours origin "${branch}" || git rebase --abort || true
          done
          echo "::error::5回試行しても push できませんでした"
          exit 1

      # サイトを見に行かないと失敗に気づけない問題への対策（2026-07-24）。
      # このジョブの直前ステップのいずれかが失敗したときだけ実行され、既存の
      # ntfy.sh 通知(スマホアプリで購読中)へ即座に届く。
      - name: Notify on failure
        if: failure()
        run: |
          curl -fsS -X POST "https://ntfy.sh/${{ secrets.NTFY_TOPIC }}" \
            -H "Title: wn-archive(公開版) refresh-data 失敗" \
            -H "Priority: high" \
            -H "Tags: claude-ops,warning" \
            -d "公開版アーカイブの更新に失敗しました。詳細: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
